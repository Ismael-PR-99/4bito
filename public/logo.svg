  <rect class="b" x="150" y="30" width="10" height="10"/>
  <rect class="b" x="160" y="30" width="10" height="10"/>

  <!-- ======= CUERPO PRINCIPAL (rows 4–17) ======= -->
  <!-- Generamos las filas del cuerpo: borde izq + relleno blanco + borde der -->

  <!-- row 4 -->
  <rect class="b" x="50"  y="40" width="10" height="10"/>
  <rect class="w" x="60"  y="40" width="100" height="10"/>
  <rect class="b" x="160" y="40" width="10" height="10"/>

  <!-- row 5 -->
  <rect class="b" x="50"  y="50" width="10" height="10"/>
  <rect class="w" x="60"  y="50" width="100" height="10"/>
  <rect class="b" x="160" y="50" width="10" height="10"/>

  <!-- row 6 -->
  <rect class="b" x="50"  y="60" width="10" height="10"/>
  <rect class="w" x="60"  y="60" width="100" height="10"/>
  <rect class="b" x="160" y="60" width="10" height="10"/>

  <!-- row 7 — número 10: fila 1 -->
  <rect class="b" x="50"  y="70" width="10" height="10"/>
  <rect class="w" x="60"  y="70" width="10" height="10"/>
  <!-- "1" -->
  <rect class="b" x="70"  y="70" width="10" height="10"/>
  <rect class="b" x="80"  y="70" width="10" height="10"/>
  <rect class="w" x="90"  y="70" width="10" height="10"/>
  <!-- gap -->
  <rect class="w" x="100" y="70" width="10" height="10"/>
  <!-- "0" top -->
  <rect class="b" x="110" y="70" width="10" height="10"/>
  <rect class="b" x="120" y="70" width="10" height="10"/>
  <rect class="b" x="130" y="70" width="10" height="10"/>
  <rect class="w" x="140" y="70" width="10" height="10"/>
  <rect class="w" x="150" y="70" width="10" height="10"/>
  <rect class="b" x="160" y="70" width="10" height="10"/>

  <!-- row 8 — número 10: fila 2 -->
  <rect class="b" x="50"  y="80" width="10" height="10"/>
  <rect class="w" x="60"  y="80" width="10" height="10"/>
  <rect class="b" x="70"  y="80" width="10" height="10"/>
  <rect class="b" x="80"  y="80" width="10" height="10"/>
  <rect class="w" x="90"  y="80" width="10" height="10"/>
  <rect class="w" x="100" y="80" width="10" height="10"/>
  <rect class="b" x="110" y="80" width="10" height="10"/>
  <rect class="w" x="120" y="80" width="10" height="10"/>
  <rect class="b" x="130" y="80" width="10" height="10"/>
  <rect class="w" x="140" y="80" width="10" height="10"/>
  <rect class="w" x="150" y="80" width="10" height="10"/>
  <rect class="b" x="160" y="80" width="10" height="10"/>

  <!-- row 9 -->
  <rect class="b" x="50"  y="90" width="10" height="10"/>
  <rect class="w" x="60"  y="90" width="10" height="10"/>
  <rect class="w" x="70"  y="90" width="10" height="10"/>
  <rect class="b" x="80"  y="90" width="10" height="10"/>
  <rect class="w" x="90"  y="90" width="10" height="10"/>
  <rect class="w" x="100" y="90" width="10" height="10"/>
  <rect class="b" x="110" y="90" width="10" height="10"/>
  <rect class="w" x="120" y="90" width="10" height="10"/>
  <rect class="b" x="130" y="90" width="10" height="10"/>
  <rect class="w" x="140" y="90" width="10" height="10"/>
  <rect class="w" x="150" y="90" width="10" height="10"/>
  <rect class="b" x="160" y="90" width="10" height="10"/>

  <!-- row 10 -->
  <rect class="b" x="50"  y="100" width="10" height="10"/>
  <rect class="w" x="60"  y="100" width="10" height="10"/>
  <rect class="w" x="70"  y="100" width="10" height="10"/>
  <rect class="b" x="80"  y="100" width="10" height="10"/>
  <rect class="w" x="90"  y="100" width="10" height="10"/>
  <rect class="w" x="100" y="100" width="10" height="10"/>
  <rect class="b" x="110" y="100" width="10" height="10"/>
  <rect class="w" x="120" y="100" width="10" height="10"/>
  <rect class="b" x="130" y="100" width="10" height="10"/>
  <rect class="w" x="140" y="100" width="10" height="10"/>
  <rect class="w" x="150" y="100" width="10" height="10"/>
  <rect class="b" x="160" y="100" width="10" height="10"/>

  <!-- row 11 -->
  <rect class="b" x="50"  y="110" width="10" height="10"/>
  <rect class="w" x="60"  y="110" width="10" height="10"/>
  <rect class="w" x="70"  y="110" width="10" height="10"/>
  <rect class="b" x="80"  y="110" width="10" height="10"/>
  <rect class="w" x="90"  y="110" width="10" height="10"/>
  <rect class="w" x="100" y="110" width="10" height="10"/>
  <rect class="b" x="110" y="110" width="10" height="10"/>
  <rect class="w" x="120" y="110" width="10" height="10"/>
  <rect class="b" x="130" y="110" width="10" height="10"/>
  <rect class="w" x="140" y="110" width="10" height="10"/>
  <rect class="w" x="150" y="110" width="10" height="10"/>
  <rect class="b" x="160" y="110" width="10" height="10"/>

  <!-- row 12 — número 10: última fila -->
  <rect class="b" x="50"  y="120" width="10" height="10"/>
  <rect class="w" x="60"  y="120" width="10" height="10"/>
  <rect class="b" x="70"  y="120" width="10" height="10"/>
  <rect class="b" x="80"  y="120" width="10" height="10"/>
  <rect class="b" x="90"  y="120" width="10" height="10"/>
  <rect class="w" x="100" y="120" width="10" height="10"/>
  <rect class="b" x="110" y="120" width="10" height="10"/>
  <rect class="b" x="120" y="120" width="10" height="10"/>
  <rect class="b" x="130" y="120" width="10" height="10"/>
  <rect class="w" x="140" y="120" width="10" height="10"/>
  <rect class="w" x="150" y="120" width="10" height="10"/>
  <rect class="b" x="160" y="120" width="10" height="10"/>

  <!-- rows 13–17: cuerpo liso -->
  <rect class="b" x="50"  y="130" width="10" height="10"/>
  <rect class="w" x="60"  y="130" width="100" height="10"/>
  <rect class="b" x="160" y="130" width="10" height="10"/>

  <rect class="b" x="50"  y="140" width="10" height="10"/>
  <rect class="w" x="60"  y="140" width="100" height="10"/>
  <rect class="b" x="160" y="140" width="10" height="10"/>

  <rect class="b" x="50"  y="150" width="10" height="10"/>
  <rect class="w" x="60"  y="150" width="100" height="10"/>
  <rect class="b" x="160" y="150" width="10" height="10"/>

  <!-- ======= PARTE INFERIOR (rows 16-19): se va estrechando hacia dobladillo ======= -->
  <rect class="b" x="50"  y="160" width="10" height="10"/>
  <rect class="w" x="60"  y="160" width="100" height="10"/>
  <rect class="b" x="160" y="160" width="10" height="10"/>

  <rect class="b" x="50"  y="170" width="10" height="10"/>
  <rect class="w" x="60"  y="170" width="100" height="10"/>
  <rect class="b" x="160" y="170" width="10" height="10"/>

  <!-- Dobladillo inferior -->
  <rect class="b" x="50"  y="180" width="10" height="10"/>
  <rect class="b" x="60"  y="180" width="100" height="10"/>
  <rect class="b" x="160" y="180" width="10" height="10"/>

  <!-- Última fila dobladillo (más fina) -->
  <rect class="d" x="50"  y="190" width="120" height="5"/>

</svg>
