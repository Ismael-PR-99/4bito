<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" width="440" height="400" shape-rendering="crispEdges">

  <!--
    PIXEL ART RETRO JERSEY
    Grid: cada píxel = 10x10 unidades
    Coordenadas en píxeles (col, row) — multiplicar x10 para SVG units
  -->

  <defs>
    <style>
      .b { fill: #111111; }
      .w { fill: #f0f0f0; }
      .g { fill: #888888; }
      .d { fill: #444444; }
    </style>
  </defs>

  <!-- ======= MANGA IZQUIERDA ======= -->
  <!-- row 0 -->
  <rect class="b" x="0"  y="0"  width="10" height="10"/>
  <rect class="b" x="10" y="0"  width="10" height="10"/>
  <rect class="b" x="20" y="0"  width="10" height="10"/>

  <!-- row 1 -->
  <rect class="b" x="0"  y="10" width="10" height="10"/>
  <rect class="w" x="10" y="10" width="10" height="10"/>
  <rect class="w" x="20" y="10" width="10" height="10"/>
  <rect class="b" x="30" y="10" width="10" height="10"/>

  <!-- row 2 -->
  <rect class="b" x="10" y="20" width="10" height="10"/>
  <rect class="w" x="20" y="20" width="10" height="10"/>
  <rect class="w" x="30" y="20" width="10" height="10"/>
  <rect class="b" x="40" y="20" width="10" height="10"/>

  <!-- row 3 -->
  <rect class="b" x="20" y="30" width="10" height="10"/>
  <rect class="w" x="30" y="30" width="10" height="10"/>
  <rect class="w" x="40" y="30" width="10" height="10"/>
  <rect class="b" x="50" y="30" width="10" height="10"/>

  <!-- ======= MANGA DERECHA ======= -->
  <!-- row 0 -->
  <rect class="b" x="190" y="0"  width="10" height="10"/>
  <rect class="b" x="200" y="0"  width="10" height="10"/>
  <rect class="b" x="210" y="0"  width="10" height="10"/>

  <!-- row 1 -->
  <rect class="b" x="180" y="10" width="10" height="10"/>
  <rect class="w" x="190" y="10" width="10" height="10"/>
  <rect class="w" x="200" y="10" width="10" height="10"/>
  <rect class="b" x="210" y="10" width="10" height="10"/>

  <!-- row 2 -->
  <rect class="b" x="170" y="20" width="10" height="10"/>
  <rect class="w" x="180" y="20" width="10" height="10"/>
  <rect class="w" x="190" y="20" width="10" height="10"/>
  <rect class="b" x="200" y="20" width="10" height="10"/>

  <!-- row 3 -->
  <rect class="b" x="160" y="30" width="10" height="10"/>
  <rect class="w" x="170" y="30" width="10" height="10"/>
  <rect class="w" x="180" y="30" width="10" height="10"/>
  <rect class="b" x="190" y="30" width="10" height="10"/>

  <!-- ======= HOMBROS + CUELLO (row 0-3, centro) ======= -->
  <!-- row 0: hombro izquierdo -->
  <rect class="b" x="30"  y="0" width="10" height="10"/>
  <rect class="b" x="40"  y="0" width="10" height="10"/>
  <rect class="b" x="50"  y="0" width="10" height="10"/>
  <rect class="b" x="60"  y="0" width="10" height="10"/>
  <!-- cuello -->
  <rect class="b" x="70"  y="0" width="10" height="10"/>
  <rect class="w" x="80"  y="0" width="10" height="10"/>
  <rect class="w" x="90"  y="0" width="10" height="10"/>
  <rect class="w" x="100" y="0" width="10" height="10"/>
  <rect class="w" x="110" y="0" width="10" height="10"/>
  <rect class="w" x="120" y="0" width="10" height="10"/>
  <rect class="w" x="130" y="0" width="10" height="10"/>
  <rect class="b" x="140" y="0" width="10" height="10"/>
  <!-- hombro derecho -->
  <rect class="b" x="150" y="0" width="10" height="10"/>
  <rect class="b" x="160" y="0" width="10" height="10"/>
  <rect class="b" x="170" y="0" width="10" height="10"/>
  <rect class="b" x="180" y="0" width="10" height="10"/>

  <!-- row 1: hombros -->
  <rect class="b" x="40"  y="10" width="10" height="10"/>
  <rect class="b" x="50"  y="10" width="10" height="10"/>
  <rect class="b" x="60"  y="10" width="10" height="10"/>
  <rect class="b" x="70"  y="10" width="10" height="10"/>
  <!-- cuello interior -->
  <rect class="d" x="80"  y="10" width="10" height="10"/>
  <rect class="d" x="90"  y="10" width="10" height="10"/>
  <rect class="d" x="100" y="10" width="10" height="10"/>
  <rect class="d" x="110" y="10" width="10" height="10"/>
  <rect class="d" x="120" y="10" width="10" height="10"/>
  <rect class="d" x="130" y="10" width="10" height="10"/>
  <rect class="b" x="140" y="10" width="10" height="10"/>
  <rect class="b" x="150" y="10" width="10" height="10"/>
  <rect class="b" x="160" y="10" width="10" height="10"/>
  <rect class="b" x="170" y="10" width="10" height="10"/>

  <!-- row 2: hombros -->
  <rect class="b" x="50"  y="20" width="10" height="10"/>
  <rect class="b" x="60"  y="20" width="10" height="10"/>
  <rect class="b" x="70"  y="20" width="10" height="10"/>
  <rect class="b" x="80"  y="20" width="10" height="10"/>
  <rect class="w" x="90"  y="20" width="10" height="10"/>
  <rect class="w" x="100" y="20" width="10" height="10"/>
  <rect class="w" x="110" y="20" width="10" height="10"/>
  <rect class="w" x="120" y="20" width="10" height="10"/>
  <rect class="b" x="130" y="20" width="10" height="10"/>
  <rect class="b" x="140" y="20" width="10" height="10"/>
  <rect class="b" x="150" y="20" width="10" height="10"/>
  <rect class="b" x="160" y="20" width="10" height="10"/>

  <!-- row 3: zona axilas -->
  <rect class="b" x="50"  y="30" width="10" height="10"/>
  <rect class="b" x="60"  y="30" width="10" height="10"/>
  <rect class="b" x="70"  y="30" width="10" height="10"/>
  <rect class="w" x="80"  y="30" width="10" height="10"/>
  <rect class="w" x="90"  y="30" width="10" height="10"/>
  <rect class="w" x="100" y="30" width="10" height="10"/>
