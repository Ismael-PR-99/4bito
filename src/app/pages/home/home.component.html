<!-- Hero -->
<app-hero (decadeChange)="onDecadeChange($event)"></app-hero>

<!-- Grid de categorías -->
<main class="main-content">
  <div class="container">
    <div class="categorias-grid">
      <a
        class="categoria-card"
        *ngFor="let categoria of categorias"
        [routerLink]="['/categoria', categoria.slug]"
      >
        <img [src]="categoria.imageUrl" [alt]="categoria.nombre" class="categoria-img" />
        <div class="categoria-overlay">
          <h3 class="categoria-titulo">{{ categoria.nombre }}</h3>
        </div>
      </a>
    </div>
  </div>
</main>

<!-- Por Década -->
<app-por-decada [heroDecade]="selectedDecade"></app-por-decada>

<!-- Pieza de la Semana -->
<app-pieza-semana></app-pieza-semana>

<!-- Banda de Precios -->
<app-banda-honor></app-banda-honor>
