<div class="confirmado-page">

  <!-- Balón animado -->
  <div class="ball-container" [class.scored]="scored">
    <span class="ball-emoji" aria-hidden="true">⚽</span>
  </div>

  <!-- Contenido que aparece después -->
  <div class="confirmation-content" [class.visible]="showContent">

    <!-- GOL! con glitch -->
    <h1 class="goal-text glitch" data-text="¡GOL!">¡GOL!</h1>
    <h2 class="conf-title" animateOnScroll="fadeUp">PEDIDO CONFIRMADO</h2>

    <p class="conf-subtitle" animateOnScroll="fadeUp" [aosDelay]="80">Tu pedido ha sido recibido y está siendo procesado.</p>

    <div class="conf-order-num" *ngIf="numeroPedido" animateOnScroll="fadeUp" [aosDelay]="160">
      <span class="conf-order-label">NÚMERO DE PEDIDO</span>
      <span class="conf-order-val">{{ numeroPedido }}</span>
    </div>

    <p class="conf-info" animateOnScroll="fadeUp" [aosDelay]="240">
      Recibirás un email de confirmación en breve con todos los detalles de tu compra.<br>
      El envío se realizará en un plazo de <strong>24/48 horas</strong>.
    </p>

    <div class="confirmation-actions" animateOnScroll="fadeUp" [aosDelay]="320">
      <button class="btn btn-primary btn-lg" [routerLink]="['/perfil']">
        VER MIS PEDIDOS
      </button>
      <button class="btn btn-ghost btn-lg" (click)="volverTienda()">
        SEGUIR COMPRANDO
      </button>
    </div>

  </div>
</div>
