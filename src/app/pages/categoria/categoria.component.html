<div class="cat-page">
  <div class="cat-header">
    <button class="btn-back" (click)="volver()">← Volver</button>
    <h1 class="cat-title">{{ categoria?.nombre }}</h1>

    <!-- Botón visible SOLO para admin en Retro Selecciones -->
    <button
      *ngIf="esAdmin"
      class="btn-admin-add"
      (click)="abrirModal()"
    >
      + Añadir Producto
    </button>
  </div>

  <!-- Spinner mientras carga -->
  <div class="loading-state" *ngIf="cargando">
    <span class="loader-dots"><span></span><span></span><span></span></span>
    <p>Cargando colección…</p>
  </div>

  <div class="productos-grid" *ngIf="!cargando">
    <div
      class="producto-card"
      *ngFor="let producto of productos"
      (click)="irAProducto(producto.id)"
    >
      <div class="producto-img-wrap">
        <img [src]="producto.imageUrl" [alt]="producto.nombre" class="producto-img" loading="lazy" />
      </div>

      <!-- Botones de acción admin (fuera del img-wrap para no ser recortados) -->
      <div class="card-acciones" *ngIf="esAdmin">
        <button
          class="btn-accion btn-accion-editar"
          title="Editar producto"
          (click)="$event.stopPropagation(); editarProducto(producto)"
        >&#9998;</button>
        <button
          class="btn-accion btn-accion-eliminar"
          title="Eliminar producto"
          (click)="$event.stopPropagation(); eliminarProducto(producto.id)"
        >&#128465;</button>
      </div>
      <div class="producto-info">
        <span class="producto-nombre">{{ producto.nombre }}</span>
        <span class="producto-precio">{{ producto.precio }}€</span>
      </div>
    </div>

    <!-- Estado vacío -->
    <div class="empty-state" *ngIf="productos.length === 0">
      <p>Próximamente — estamos añadiendo piezas a esta colección.</p>
    </div>
  </div>
</div>

<!-- Modal: solo se monta cuando está abierto -->
<ng-container *ngIf="mostrarModal">
  <app-anadir-producto
    [categoriaSlug]="slugActual"
    (cerrar)="cerrarModal()"
    (productoCreado)="onProductoCreado($event)"
  ></app-anadir-producto>
</ng-container>

<!-- Modal: editar producto -->
<ng-container *ngIf="productoEditando">
  <app-editar-producto
    [producto]="$any(productoEditando)"
    [categoriaSlug]="slugActual"
    (cerrar)="cerrarModalEditar()"
    (productoActualizado)="onProductoActualizado($event)"
  ></app-editar-producto>
</ng-container>
