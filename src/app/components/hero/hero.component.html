<section class="hero">

  <!-- CRT Intro Overlay -->
  <div class="crt-intro" [class.done]="introComplete">
    <!-- Línea de encendido CRT -->
    <div class="crt-line"></div>
    <!-- Static noise -->
    <div class="crt-static"></div>
    <!-- VHS tracking -->
    <div class="vhs-tracking"></div>
  </div>

  <!-- Scanline noise overlay (permanente, sutil) -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- Fondo: grid -->
  <div class="grid-bg" aria-hidden="true"></div>

  <!-- Gradient orbs de fondo -->
  <div class="orb orb--1" aria-hidden="true"></div>
  <div class="orb orb--2" aria-hidden="true"></div>
  <div class="orb orb--3" aria-hidden="true"></div>

  <!-- Líneas decorativas geométricas -->
  <div class="deco-lines" aria-hidden="true">
    <div class="deco-line deco-line--h1"></div>
    <div class="deco-line deco-line--h2"></div>
    <div class="deco-line deco-line--v1"></div>
    <div class="deco-line deco-line--v2"></div>
    <div class="deco-corner deco-corner--tl"></div>
    <div class="deco-corner deco-corner--br"></div>
  </div>

  <!-- Línea verde superior -->
  <div class="hero-topline" aria-hidden="true"></div>

  <!-- Año gigante de fondo -->
  <div class="year-bg" aria-hidden="true">{{ activeDecade() }}</div>

  <!-- Stats derecha -->
  <aside class="hero-stats" aria-label="Estadísticas">
    <div class="stat" *ngFor="let s of stats; let i = index; trackBy: trackByStat">
      <span class="stat__value">{{ s.value }}</span>
      <span class="stat__label">{{ s.label }}</span>
      <span class="stat__bar" *ngIf="i < 2"></span>
    </div>
  </aside>

  <!-- Selector de décadas izquierda -->
  <aside class="hero-decades" aria-label="Selector de décadas">
    <span class="decades__label">Década</span>
    <button
      *ngFor="let d of decades; trackBy: trackByDecade"
      class="decade-btn"
      [class.active]="d === activeDecade()"
      (click)="setDecade(d)"
    >{{ d }}</button>
  </aside>

  <!-- Contenido central -->
  <div class="hero-content">
    <div class="hero-eyebrow-wrap">
      <span class="eyebrow-line"></span>
      <p class="hero-eyebrow">Tienda retro deportiva</p>
      <span class="eyebrow-line"></span>
    </div>

    <h1
      class="hero-h1"
      [attr.data-text]="'4BITO RETRO SPORTS'"
      aria-label="4BITO RETRO SPORTS"
    >
      <span class="h1-line h1-line--1">4BITO</span>
      <span class="h1-line h1-line--2 accent">RETRO</span>
      <span class="h1-line h1-line--3">SPORTS</span>
    </h1>

    <p class="hero-sub">
      Equipaciones&nbsp;·&nbsp;Objetos de culto&nbsp;·&nbsp;Desde los 70s hasta los 00s
    </p>

    <div class="hero-cta">
      <button class="btn btn--primary" (click)="goToCollection()">Ver colección</button>
      <button class="btn btn--ghost"   (click)="goToNew()">Novedades</button>
    </div>
  </div>

  <!-- Ticker inferior -->
  <div class="hero-ticker" aria-hidden="true">
    <div class="ticker-track">
      <span class="ticker-item" *ngFor="let item of tickerItems; trackBy: trackByTicker">
        <span class="ticker-dot">●</span> {{ item }}
      </span>
      <!-- Track duplicado para loop infinito -->
      <span class="ticker-item" *ngFor="let item of tickerItems; trackBy: trackByTicker">
        <span class="ticker-dot">●</span> {{ item }}
      </span>
    </div>
  </div>

  <!-- Pixel particles -->
  <div class="pixel-particles" aria-hidden="true">
    <div class="pixel" *ngFor="let p of pixels"
         [style.left.%]="p.x"
         [style.top.%]="p.y"
         [style.animationDelay.s]="p.delay"
         [style.animationDuration.s]="p.dur"
         [style.width.px]="p.size"
         [style.height.px]="p.size"
         [style.opacity]="p.opacity">
    </div>
  </div>

</section>
