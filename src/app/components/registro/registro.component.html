<div class="login-bg">
  <!-- Grid geométrico -->
  <div class="bg-grid"></div>

  <!-- Partículas flotantes -->
  <span
    *ngFor="let p of particulas"
    class="particula"
    [style.left.%]="p.x"
    [style.top.%]="p.y"
    [style.animation-delay.s]="p.delay"
    [style.animation-duration.s]="p.dur"
  ></span>

  <!-- Overlay de éxito -->
  <div class="exito-overlay" *ngIf="registroExitoso" [@exito]>
    <div class="exito-ring"></div>
    <div class="exito-inner">
      <svg viewBox="0 0 24 24" fill="none" class="check-icon">
        <polyline points="20 6 9 17 4 12" stroke="#000" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="exito-texto">CUENTA CREADA</p>
  </div>

  <!-- Card -->
  <div class="login-card" [@cardEntrada] [@shake]="shakeState">

    <!-- Logo -->
    <div class="login-logo">
      <img src="logo.svg" alt="4BITO" class="logo-img" />
    </div>

    <!-- Título -->
    <h2 class="login-title" data-text="CREAR CUENTA">CREAR CUENTA</h2>
    <p class="login-sub">Regístrate en 4BITO RETRO SPORTS</p>

    <!-- Error -->
    <div class="error-msg" *ngIf="error" [@fadeIn]>
      <span class="error-icon">⚠</span>&nbsp;{{ error }}
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onSubmit()" class="login-form">

      <!-- Nombre -->
      <div class="input-group" [class.has-value]="nombre.length > 0">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.6"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <input
          type="text"
          [(ngModel)]="nombre"
          name="nombre"
          placeholder="NOMBRE"
          autocomplete="name"
          required
        />
      </div>

      <!-- Email -->
      <div class="input-group" [class.has-value]="email.length > 0">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
            <rect x="2" y="4" width="20" height="16" rx="2"
              stroke="currentColor" stroke-width="1.6"/>
            <path d="M2 8l10 6 10-6"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="EMAIL"
          autocomplete="email"
          required
        />
      </div>

      <!-- Contraseña -->
      <div class="input-group" [class.has-value]="password.length > 0">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
            <rect x="5" y="11" width="14" height="10" rx="2"
              stroke="currentColor" stroke-width="1.6"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="CONTRASEÑA"
          autocomplete="new-password"
          required
        />
      </div>

      <!-- Confirmar contraseña -->
      <div class="input-group" [class.has-value]="confirmarPassword.length > 0">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
            <rect x="5" y="11" width="14" height="10" rx="2"
              stroke="currentColor" stroke-width="1.6"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M9 16.5l2 2 4-4"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <input
          type="password"
          [(ngModel)]="confirmarPassword"
          name="confirmarPassword"
          placeholder="CONFIRMAR CONTRASEÑA"
          autocomplete="new-password"
          required
        />
      </div>

      <button type="submit" class="btn-login"
        [class.success]="registroExitoso"
        [disabled]="cargando || registroExitoso">
        <span *ngIf="!cargando && !registroExitoso">CREAR CUENTA</span>
        <span class="btn-loader" *ngIf="cargando">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </span>
        <span *ngIf="registroExitoso">✓</span>
      </button>
    </form>

    <p class="register-link">
      ¿Ya tienes cuenta?&nbsp;<a [routerLink]="['/login']">INICIA SESIÓN</a>
    </p>

  </div>
</div>
