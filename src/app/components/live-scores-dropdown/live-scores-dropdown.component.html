<!-- Wrapper con posición relativa para anclar el dropdown -->
<div class="live-scores-wrapper">

  <!-- Botón de activación -->
  <button class="btn-live" [class.open]="open" (click)="toggle()">
    <span class="live-dot" [class.any-live]="anyLive"></span>
    MARCADORES EN VIVO
    <span class="chevron" [class.rotated]="open">&#9662;</span>
  </button>

  <!-- Panel dropdown -->
  <div class="live-panel" *ngIf="open">

    <div class="panel-header">
      <span class="panel-title">LIGAS EUROPEAS HOY</span>
    </div>

    <!-- Acordeón por liga -->
    <div
      class="league-block"
      *ngFor="let league of leagues"
      [class.expanded]="activeLeague === league.code"
    >
      <!-- Cabecera de liga -->
      <button class="league-header" (click)="toggleLeague(league.code)">
        <img class="league-flag" [src]="'https://flagcdn.com/20x15/' + league.flag + '.png'" [alt]="league.name" width="20" height="15">
        <span class="league-name">{{ league.name }}</span>

        <span class="live-badge" *ngIf="liveCount(league) > 0">
          <span class="badge-dot"></span>{{ liveCount(league) }} LIVE
        </span>

        <span class="league-chevron" [class.rotated]="activeLeague === league.code">&#9662;</span>
      </button>

      <!-- Lista de partidos -->
      <div class="league-matches" *ngIf="activeLeague === league.code">

        <!-- Cargando -->
        <div class="matches-loading" *ngIf="league.loading">
          <span class="dots"><span></span><span></span><span></span></span>
        </div>

        <!-- Error -->
        <div class="matches-error" *ngIf="!league.loading && league.error">
          Error al cargar partidos
        </div>

        <!-- Sin partidos -->
        <div class="matches-empty" *ngIf="!league.loading && !league.error && league.matches.length === 0">
          No hay partidos programados hoy
        </div>

        <!-- Partidos -->
        <div
          class="match-row"
          *ngFor="let match of league.matches"
          [class.is-live]="isLive(match)"
        >
          <!-- Equipo local -->
          <span class="team home">{{ shortName(match.homeTeam) }}</span>

          <!-- Marcador / hora -->
          <div class="score-block">
            <span class="score">{{ scoreDisplay(match) }}</span>
            <span
              class="status-badge"
              [class.badge-live]="statusLabel(match) === 'LIVE'"
              [class.badge-ht]="statusLabel(match) === 'HT'"
              [class.badge-ft]="statusLabel(match) === 'FT'"
              [class.badge-pre]="statusLabel(match) === 'PRE'"
            >
              <span class="status-dot" *ngIf="statusLabel(match) === 'LIVE'"></span>
              {{ statusLabel(match) }}
              <ng-container *ngIf="match.minute">{{ match.minute }}'</ng-container>
            </span>
          </div>

          <!-- Equipo visitante -->
          <span class="team away">{{ shortName(match.awayTeam) }}</span>
        </div>

      </div>
    </div>

    <div class="panel-footer">
      Datos: football-data.org · Actualización cada 60s
    </div>
  </div>

</div>
