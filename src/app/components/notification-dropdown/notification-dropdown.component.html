<div class="notif-wrapper">
  <button class="notif-btn" (click)="toggle()">
    <lucide-icon [img]="icons.Bell" [size]="20"></lucide-icon>
    @if (notifSvc.unreadCount() > 0) {
      <span class="notif-badge">{{ notifSvc.unreadCount() > 9 ? '9+' : notifSvc.unreadCount() }}</span>
    }
  </button>

  @if (notifSvc.isOpen()) {
    <div class="notif-dropdown">
      <div class="notif-header">
        <h4>Notificaciones</h4>
        @if (notifSvc.unreadCount() > 0) {
          <button class="mark-all" (click)="markAllRead()">
            <lucide-icon [img]="icons.CheckCheck" [size]="14"></lucide-icon>
            Marcar todas
          </button>
        }
      </div>

      <div class="notif-list">
        @if (notifSvc.notifications().length === 0) {
          <div class="notif-empty">No tienes notificaciones</div>
        }
        @for (n of notifSvc.notifications(); track n.id) {
          <div class="notif-item" [class.unread]="!n.is_read" (click)="markRead(n)">
            <span class="notif-icon">{{ typeIcon(n.type) }}</span>
            <div class="notif-content">
              <p class="notif-title">{{ n.title }}</p>
              <p class="notif-body">{{ n.body }}</p>
              <span class="notif-time">{{ timeAgo(n.created_at) }}</span>
            </div>
          </div>
        }
      </div>
    </div>
  }
</div>
