services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-4bito}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./4bito-api/db/migrations/postgres_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./4bito-api/db/migrations/006_performance_indexes.sql:/docker-entrypoint-initdb.d/02_indexes.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-4bito}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:           3000
      DB_HOST:        db
      DB_PORT:        5432
      DB_NAME:        ${DB_NAME:-4bito}
      DB_USER:        ${DB_USER:-postgres}
      DB_PASS:        ${DB_PASS:-postgres}
      JWT_SECRET:     ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      CORS_ORIGIN:    ${CORS_ORIGIN:-http://localhost:4200}
      SMTP_HOST:      ${SMTP_HOST:-localhost}
      SMTP_PORT:      ${SMTP_PORT:-25}
      SMTP_SECURE:    ${SMTP_SECURE:-false}
      SMTP_USER:      ${SMTP_USER:-}
      SMTP_PASS:      ${SMTP_PASS:-}
      SMTP_FROM:      ${SMTP_FROM:-noreply@4bito.com}
      ADMIN_EMAIL:    ${ADMIN_EMAIL:-admin@4bito.com}
      FRONTEND_URL:   ${FRONTEND_URL:-http://localhost:4200}
      UPLOAD_DIR:     /uploads
      UPLOAD_URL:     ${UPLOAD_URL:-http://localhost:3000/uploads}
      NODE_ENV:       production
    volumes:
      - uploads:/uploads
    ports:
      - "3000:3000"

volumes:
  pgdata:
  uploads:
